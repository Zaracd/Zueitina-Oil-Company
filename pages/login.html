<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | ZOC</title>

  <script>
    (function(){ var t = localStorage.getItem('zoc-theme'); if(t === 'dark') document.documentElement.setAttribute('data-theme','dark'); })();
  </script>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="login-page">

  <div class="login-brand-panel">
    <div class="brand-panel-content">
      <img src="https://www.zueitina.com.ly/images/logo-en.png" alt="logo">
      <h1>شركة الزويتينة للنفط</h1>
      <p>منصة داخلية حديثة لإدارة الأخبار والخدمات والعمليات.</p>
    </div>
  </div>

  <div class="login-form-panel">
    <div class="login-form-inner">

      <p class="eyebrow">LOGIN</p>
      <h2>تسجيل الدخول</h2>
      <p>قم بإدخال بياناتك للوصول للنظام.</p>

      <form id="loginForm">

        <div class="field">
          <label>اسم المستخدم</label>
          <input type="text" id="username" placeholder="أدخل اسم المستخدم">
        </div>

        <div class="field">
          <label>كلمة المرور</label>
          <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>

        <button class="login-submit" type="submit">
          دخول
        </button>

        <div class="login-error" id="errorBox">
          اسم المستخدم أو كلمة المرور غير صحيحة
        </div>

      </form>

      <a class="back-link" href="../index.html">
        العودة للرئيسية
      </a>

    </div>
  </div>

</div>

<script src="../js/shared.js"></script>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();

    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if(user === 'admin' && pass === '1234'){
        alert('تم تسجيل الدخول بنجاح');
        window.location.href = '../index.html';
    }else{
        document.getElementById('errorBox').classList.add('show');
    }
});
</script>

</body>
</html>
